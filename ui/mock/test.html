<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        dialog[open] {
            background-color: aqua;
            display: flex;
        }

    </style>
</head>
<body>
    <button>OPEN</button>
    <dialog>
        <h2>DIALOG</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Hic recusandae quibusdam incidunt iusto. Quasi, magnam! Blanditiis doloribus doloremque, ut recusandae, id quos aperiam, itaque error quibusdam inventore delectus laborum dolorum.</p>
    </dialog>
    <script>
        document.querySelector('dialog').showModal();
        /* document.querySelector('dialog').close(); */
    </script>
</body>
</html>
