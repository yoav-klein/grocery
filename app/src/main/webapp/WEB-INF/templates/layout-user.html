<!DOCTYPE html>
<html th:attr="dir=${#locale.language == 'he' ? 'rtl' : 'ltr'}" lang="en" th:fragment="layout(head, content, scripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery App</title>
    <!-- common header and stylesheets -->
    <link rel="stylesheet" href="../../css/base.css" th:href="@{/css/base.css}">
    <link rel="stylesheet" href="../../css/popovers.css" th:href="@{/css/popovers.css}">
    <link rel="stylesheet" href="../../css/layout-user.css" th:href="@{/css/layout-user.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <th:block th:include="${head}"></div>   
</head>
<body>
    <header>
        <button id="menu-button">
            <svg class="menu-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#fff"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
        </button>
        <div class="languages popover">
            <button class="change-language-button popover-button">
                <span th:text="${#locale.language}"></span>
                <span>&#x1F310;</span>
            </button>
            <div class="languages-menu popover-menu layout-header-menu">
                <a class="layout-header-menu-item" href="?lang=he" th:href="@{?lang=he}"><span class="fi fi-il"></span><span>עב</span></a>
                <a class="layout-header-menu-item" href="?lang=en" th:href="@{?lang=en}"><span class="fi fi-um"></span><span>En</span></a>
            </div>
        </div>
        <div class="user-avatar popover">
            <button class="popover-button">
                <img referrerpolicy="no-referrer" th:src="${user.pictureUrl}" alt="user picture">
            </button>
            <div class="popover-menu user-menu layout-header-menu">
                <div class="divider"></div>
                <button class="layout-header-menu-item">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </header>
    <div th:replace="${content}"></div>
    <th:block th:replace="${scripts}" />
    <script th:src="@{/js/layout.js}" src="../../js/layout.js"></script>
    <script th:src="@{/js/popovers.js}" src="../../js/popovers.js"></script>
    <script src="https://kit.fontawesome.com/68d2baaa06.js" crossorigin="anonymous"></script>
</body>
</html>
