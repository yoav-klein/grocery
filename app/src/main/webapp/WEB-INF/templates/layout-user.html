<!DOCTYPE html>
<html th:attr="dir=${#locale.language == 'he' ? 'rtl' : 'ltr'}" lang="en" th:fragment="layout(head, content, scripts, is_tenant_specific)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Grocery App</title>
    <!-- common header and stylesheets -->
    <link rel="stylesheet" href="../../css/base.css" th:href="@{/css/base.css}">
    <link rel="stylesheet" href="../../css/dialogs.css" th:href="@{/css/dialogs.css}">
    <link rel="stylesheet" href="../../css/dropdown-menus.css" th:href="@{/css/dropdown-menus.css}">
    <link rel="stylesheet" href="../../css/layout-user.css" th:href="@{/css/layout-user.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <!--/*/ <th:block th:replace="${head}" /> /*/-->
</head>
<body>
    <header>
        <button id="tenant-menu-button" th:if="${is_tenant_specific}">
            <svg class="menu-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#fff"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
        </button>
        <div class="dropdown js-dropdown user-dropdown">
            <button class="js-dropdown-trigger open-menu-button">
                <img referrerpolicy="no-referrer" src="../../img/family-768x512.jpg" th:src="${user.pictureUrl}" alt="user picture">
            </button>
            <div class="dropdown-menu user-menu">
                <div class="user-details">
                    <p th:text="${user.displayName}">Yoav Klein</p>
                    <p th:text="${user.email}">yoavklein25@gmail.com</p>
                </div>
                <div class="dropdown js-dropdown language-dropdown">
                    <button class="js-dropdown-trigger menu-item">
                        <i class="fa-solid fa-language"></i>
                        <span>Language</span>
                        <i class="fa-solid fa-chevron-left chevron"></i>
                    </button>
                    <div class="dropdown-menu language-menu">
                        <a class="menu-item" href="?lang=he" th:href="@{?lang=he}"><span class="fi fi-il"></span><span>עב</span><i th:if="${#locale.language == 'he'}"class="fa-solid fa-check"></i></a>
                        <a class="menu-item" href="?lang=en" th:href="@{?lang=en}"><span class="fi fi-um"></span><span>En</span><i th:if="${#locale.language == 'en'}" class="fa-solid fa-check"></i></a>
                    </div>
                </div>
                <div class="divider"></div>
                <button id="logout-button" data-open-dialog data-dialog-id="logout-dialog" class="menu-item" data-close-menu>
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </header>
    <div id="content" class="content">
        <th:block th:include="${content}"></div>
    </div>
    <dialog id="logout-dialog" class="confirmation-dialog">
        <div class="dialog-body">
            <p>Are you sure you want to log out?</p>
        </div>
        <div class="dialog-footer">
            <form style="display: contents;" th:action="@{/logout}" method="post">
                <button type="button" class="dialog-action-button dialog-secondary-action-button js-close-dialog-button">Cancel</button>
                <button type="submit" class="dialog-action-button dialog-primary-action-button">Yes</button>
            </form>
        </div>
    </dialog>
    <th:block th:replace="${scripts}" />
    
    <script th:src="@{/js/dropdown-menus.js}" src="../../js/dropdown-menus.js"></script>
    <script th:src="@{/js/dialogs.js}" src="../../js/dialogs.js"></script>
    <script src="https://kit.fontawesome.com/68d2baaa06.js" crossorigin="anonymous"></script>
</body>
</html>
