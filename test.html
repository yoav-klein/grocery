<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        dialog[open] {
            width: 400px;
            height: 400px;
        }
    </style>
</head>
<body>
    <button id="open">OPEN</button>
    <dialog>
        <div class="footer">
            <form method="dialog">
                <button id="close">CLOSE</button>
            </form>
        </div>
    </dialog>
    <script>
        document.getElementById("open").addEventListener('click', () => { document.querySelector('dialog').showModal(); });
    </script>
</body>
</html>
