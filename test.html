<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            display: grid;
            grid-template-rows: auto 1fr;
        }

        header {
            height: 200px;
            background-color: aqua;
        }

        main {
            background-color: rgb(87, 109, 129);
            height: 100%;
        }

        
        
    </style>
</head>
<body>
    <header>
        This is header
    </header>
    <main>
        This is main
    </main>
</body>
</html>
