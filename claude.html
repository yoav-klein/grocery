<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .segmented-control {
  display: inline-flex;
  border: 1px solid #ccc;
  border-radius: 999px;
  overflow: hidden;
  background: #f0f0f0;
}

.segment {
  padding: 6px 16px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.2s, color 0.2s;
}

.segment.active {
  background: #2e7d32; /* your app's green */
  color: white;
  border-radius: 999px;
}

.segment:hover:not(.active) {
  background: #e0e0e0;
}
    </style>
</head>
<body>
    <div class="segmented-control">
        <button class="segment active" data-value="kg">Kg</button>
        <button class="segment" data-value="unit">Unit</button>
    </div>

    <script>
        document.querySelectorAll('.segment').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.segment').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// To read the selected value:
function getSelectedUnit() {
  return document.querySelector('.segment.active').dataset.value;
}
    </script>
</body>
</html>
